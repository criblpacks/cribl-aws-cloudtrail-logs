output: default
groups:
  oAjItP:
    name: Masking Account ID and Keys
    description: Masking Sensitive AWS Data
    index: 5
    disabled: false
asyncFuncTimeout: 1000
functions:
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: >-
        Parse JSON events and remove initial fields:

        - cribl_breaker - Custom cribl breaker event that is used for debugging purposes.

        - sessionToken and resultToken : Large events that are generally not needed for troubleshooting use cases. https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-event-reference-user-identity.html
  - id: eval
    filter: "true"
    disabled: null
    conf:
      add:
        - name: _raw
          value: JSON.parse(_raw)
      remove:
        - cribl_breaker
        - "*.responseElements.credentials.sessionToken"
        - "*.requestParameters.resultToken"
        - cribl_pipe
    description: Parse JSON and remove fields
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: Unroll multiple events from a single JSON event
  - id: unroll
    filter: "true"
    disabled: false
    conf:
      srcExpr: _raw.Records
      dstField: _raw
    description: Unroll Events into individual events
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: Mask Account ID's and Access Keys from events
  - id: mask
    filter: "true"
    disabled: false
    conf:
      rules:
        - matchRegex: /(^|[^A-Z0-9])[A-Z0-9]{20}(?![A-Z0-9])/
          replaceExpr: C.Mask.repeat(16)
        - matchRegex: /(^|[^A-Z0-9])[A-Z0-9]{21}(?![A-Z0-9])/
          replaceExpr: C.Mask.repeat(21)
      fields:
        - _raw.responseElements.assumedRoleUser.assumedRoleId
        - _raw.responseElements.credentials.accessKeyId
        - _raw.userIdentity.accessKeyId
    description: Mask Access Key
    groupId: oAjItP
  - id: mask
    filter: "true"
    disabled: false
    conf:
      rules:
        - matchRegex: /(^|[^A-Z0-9])[A-Z0-9]{12}(?![A-Z0-9])/
          replaceExpr: C.Mask.repeat(16)
        - replaceExpr: C.Mask.repeat(21)
          matchRegex: /(^|[^A-Z0-9])[A-Z0-9]{21}(?![A-Z0-9])/
      fields:
        - source
        - _raw.*
    description: Mask AWS Account ID's
    groupId: oAjItP
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: Simple Lookup of IP's against a known list of AWS CIDR list
  - id: lookup
    filter: "true"
    disabled: false
    conf:
      matchMode: cidr
      matchType: first
      reloadPeriodSec: 60
      addToEvent: false
      inFields:
        - eventField: _raw.sourceIPAddress
          lookupField: ip_prefix
      ignoreCase: false
      file: aws_ip_range.csv
      outFields:
        - lookupField: service
    description: Lookup IP's against known AWS IP Range
  - id: comment
    filter: "true"
    disabled: null
    conf:
      comment: Drop low value events (Describe, List and Get)
  - id: drop
    filter: /(^Describe|^List|^Get)/.test(_raw.eventName)
    disabled: false
    conf: {}
    description: Drop CloudTrail events Describe, List and Get
    final: false
  - id: eval
    filter: "true"
    disabled: null
    conf:
      add:
        - name: '"@timestamp"'
          value: parsed.eventTime
        - name: event
          value: "{}"
        - name: event.id
          value: parsed.eventID
        - name: event.type
          value: parsed.eventType
        - name: event.category
          value: "[parsed.eventCategory]"
        - name: event.provider
          value: '"aws.cloudtrail"'
        - name: event.action
          value: parsed.eventName
        - name: event.outcome
          value: "parsed.responseElements !== null ? 'success' : (parsed.errorCode ?
            'failure' : 'unknown')"
        - name: event.created
          value: C.Time.strftime(Date.now()/1000,'%Y-%m-%dT%H:%M:%S.%LZ')
        - name: aws
          value: "{}"
        - name: aws.cloudtrail
          value: "{}"
        - name: aws.cloudtrail.eventVersion
          value: parsed.eventVersion
        - name: aws.cloudtrail.userIdentity
          value: parsed.userIdentity
        - name: aws.cloudtrail.eventSource
          value: parsed.eventSource
        - name: aws.cloudtrail.eventName
          value: parsed.eventName
        - name: aws.cloudtrail.awsRegion
          value: parsed.awsRegion
        - name: aws.cloudtrail.sourceIPAddress
          value: parsed.sourceIPAddress
        - name: aws.cloudtrail.requestParameters
          value: parsed.requestParameters
        - name: aws.cloudtrail.responseElements
          value: parsed.responseElements
        - name: aws.cloudtrail.errorCode
          value: parsed.errorCode
        - name: aws.cloudtrail.errorMessage
          value: parsed.errorMessage
        - name: aws.cloudtrail.recipientAccountId
          value: parsed.recipientAccountId
        - name: source
          value: "{}"
        - name: source.ip
          value: parsed.sourceIPAddress
        - name: user
          value: "{}"
        - name: user.name
          value: "parsed.userIdentity ? parsed.userIdentity.principalId : null"
      keep:
        - '"@timestamp"'
        - event
        - event.*
        - aws
        - aws.*
        - source
        - source.*
        - user
        - user.*
      remove:
        - _raw
        - __raw
        - __criblEventType
        - __ctrlFields
        - __final
        - __cloneCount
        - __channel
        - __source
        - __isBroken
        - _time
        - parsed
    description: Build ECS-style objects and populate required fields; then
      drop/keep as requested
description: Cribl AWS CloudTrail - filtering, masking and enriching events
